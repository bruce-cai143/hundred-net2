<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理 - 学校管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .file-card {
            transition: transform 0.2s;
        }
        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .file-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .file-actions {
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .file-card:hover .file-actions {
            visibility: visible;
            opacity: 1;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #0d6efd;
            background-color: rgba(13, 110, 253, 0.05);
        }
        .progress {
            height: 5px;
            margin-top: 10px;
        }
        .file-size {
            font-size: 0.8rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-speedometer2"></i> 管理系统</h3>
        </div>
        
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="bi bi-house"></i> 控制面板</a></li>
            <li><a href="news.html"><i class="bi bi-newspaper"></i> 新闻管理</a></li>
            <li><a href="teachers.html"><i class="bi bi-people"></i> 教师管理</a></li>
            <li><a href="uploads.html" class="active"><i class="bi bi-cloud-upload"></i> 文件上传</a></li>
            <li><a href="structure.html"><i class="bi bi-diagram-3"></i> 结构管理</a></li>
            <li><a href="settings.html"><i class="bi bi-gear"></i> 系统设置</a></li>
        </ul>
    </div>
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-navbar">
            <button class="menu-toggle" id="menu-toggle">
                <i class="bi bi-list"></i>
            </button>
            
            <div class="user-info d-flex align-items-center">
                <img src="../assets/icon/admin.png" alt="管理员头像" class="me-2">
                <span id="admin-name" class="me-3">管理员</span>
                <a href="#" id="logout-btn" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </div>
        
        <!-- 文件管理内容 -->
        <div class="container-fluid">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="mb-0">文件管理</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <button type="button" class="btn btn-sm btn-outline-primary me-2" data-bs-toggle="modal" data-bs-target="#uploadModal">
                        <i class="bi bi-upload me-1"></i>上传新文件
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-success" id="manageSlides">
                        <i class="bi bi-images me-1"></i>管理轮播图
                    </button>
                </div>
            </div>
                </div>

                <!-- 文件分类筛选 -->
                <div class="mb-4">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-outline-secondary active" data-category="all">全部</button>
                        <button type="button" class="btn btn-outline-secondary" data-category="image">图片</button>
                        <button type="button" class="btn btn-outline-secondary" data-category="document">文档</button>
                        <button type="button" class="btn btn-outline-secondary" data-category="video">视频</button>
                        <button type="button" class="btn btn-outline-secondary" data-category="audio">音频</button>
                        <button type="button" class="btn btn-outline-secondary" data-category="slide">轮播图</button>
                    </div>
                </div>

                <!-- 文件列表 -->
                <div class="row" id="filesList">
                    <!-- 文件列表将通过JavaScript动态加载 -->
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                        <p class="mt-2">加载文件列表...</p>
                    </div>
                </div>

                <!-- 分页控件 -->
                <nav aria-label="Page navigation" class="mt-4">
                    <ul class="pagination justify-content-center" id="pagination">
                        <!-- 分页将通过JavaScript动态生成 -->
                    </ul>
                </nav>
            </main>
        </div>
    </div>

    <!-- 上传文件模态框 -->
    <div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="uploadModalLabel">上传文件</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="uploadArea" class="upload-area">
                        <i class="bi bi-cloud-arrow-up display-4 text-primary"></i>
                        <h4 class="mt-3">拖放文件到这里</h4>
                        <p class="text-muted">或者点击选择文件</p>
                        <input type="file" id="fileInput" class="d-none" multiple>
                        <button id="browseBtn" class="btn btn-primary mt-2">选择文件</button>
                    </div>
                    
                    <div id="uploadQueue" class="mt-4">
                        <!-- 上传队列将通过JavaScript动态生成 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" id="startUploadBtn" class="btn btn-primary">开始上传</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 文件详情模态框 -->
    <div class="modal fade" id="fileDetailModal" tabindex="-1" aria-labelledby="fileDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="fileDetailModalLabel">文件详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="fileDetailContent">
                    <!-- 文件详情将通过JavaScript动态生成 -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" id="downloadFileBtn" class="btn btn-primary">下载</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认删除模态框 -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteConfirmModalLabel">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>您确定要删除这个文件吗？此操作无法撤销。</p>
                    <p id="deleteFileName" class="fw-bold"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="confirmDeleteBtn" class="btn btn-danger">删除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 轮播图管理模态框 -->
    <div class="modal fade" id="slidesModal" tabindex="-1" aria-labelledby="slidesModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="slidesModalLabel">轮播图管理</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <button type="button" class="btn btn-primary" id="addSlideBtn">
                            <i class="bi bi-plus-lg"></i> 添加轮播图
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>序号</th>
                                    <th>标题</th>
                                    <th>图片预览</th>
                                    <th>链接</th>
                                    <th>排序</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="slides-table">
                                <!-- 轮播图数据将通过JavaScript动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑轮播图模态框 -->
    <div class="modal fade" id="slideFormModal" tabindex="-1" aria-labelledby="slideFormModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="slideFormModalLabel">添加轮播图</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="slide-form">
                        <input type="hidden" id="slide-id">
                        <div class="mb-3">
                            <label for="slide-title" class="form-label">标题</label>
                            <input type="text" class="form-control" id="slide-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="slide-image" class="form-label">图片</label>
                            <input type="file" class="form-control" id="slide-image" accept="image/*" required>
                            <div id="image-preview" class="mt-2"></div>
                        </div>
                        <div class="mb-3">
                            <label for="slide-link" class="form-label">链接</label>
                            <input type="url" class="form-control" id="slide-link">
                        </div>
                        <div class="mb-3">
                            <label for="slide-order" class="form-label">排序</label>
                            <input type="number" class="form-control" id="slide-order" min="0" value="0">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="slide-status" checked>
                            <label class="form-check-label" for="slide-status">启用</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="saveSlideBtn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/uploads.js"></script>
    
    <!-- 退出确认对话框 -->
    <div class="modal fade" id="logoutConfirmModal" tabindex="-1" aria-labelledby="logoutConfirmModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="logoutConfirmModalLabel">确认退出</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>确定要退出系统吗？</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirm-logout-btn">确认退出</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
