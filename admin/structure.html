<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结构管理 - 管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-speedometer2"></i> 管理系统</h3>
        </div>
        
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="bi bi-house"></i> 控制面板</a></li>
            <li><a href="news.html"><i class="bi bi-newspaper"></i> 新闻管理</a></li>
            <li><a href="teachers.html"><i class="bi bi-people"></i> 教师管理</a></li>
            <li><a href="uploads.html"><i class="bi bi-cloud-upload"></i> 文件上传</a></li>
            <li><a href="structure.html" class="active"><i class="bi bi-diagram-3"></i> 结构管理</a></li>
            <li><a href="settings.html"><i class="bi bi-gear"></i> 系统设置</a></li>
            
        </ul>
    </div>
    
    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-navbar">
            <button class="menu-toggle" id="menu-toggle">
                <i class="bi bi-list"></i>
            </button>
            
            <div class="user-info d-flex align-items-center">
                <img src="../assets/icon/admin.png" alt="管理员头像" class="me-2">
                <span id="admin-name" class="me-3">管理员</span>
                <a href="#" id="logout-btn" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </div>

        <div class="container-fluid">
            <div class="row">
            <div class="col-md-12 ms-sm-auto px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                    <h1 class="h2">结构管理</h1>
                </div>

                <!-- 主页区块管理 -->
                <div class="col-md-12 mb-4">
                    <div class="card">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="bi bi-grid-3x3-gap text-primary"></i> 主页区块管理</h5>
                        </div>
                        <div class="card-body">
                            <div class="list-group">
                                <!-- 轮播图管理 -->
                                <div class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">轮播图管理</h6>
                                            <small class="text-muted">管理首页轮播展示的图片、标题和链接</small>
                                        </div>
                                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#slidesModal">
                                            <i class="bi bi-images"></i> 管理轮播图
                                        </button>
                                    </div>
                                </div>
                                
                                <!-- 统计信息管理 -->
                                <div class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">统计信息管理</h6>
                                            <small class="text-muted">更新在校学生、竞赛奖项、教师团队等数据</small>
                                        </div>
                                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#statsModal">
                                            <i class="bi bi-graph-up"></i> 编辑数据
                                        </button>
                                    </div>
                                </div>

                                <!-- 校长寄语管理 -->
                                <div class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">校长寄语管理</h6>
                                            <small class="text-muted">更新校长寄语内容和签名</small>
                                        </div>
                                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#principalModal">
                                            <i class="bi bi-pencil"></i> 编辑内容
                                        </button>
                                    </div>
                                </div>

                                <!-- 特色课程管理 -->
                                <div class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">特色课程管理</h6>
                                            <small class="text-muted">管理特色课程信息和详细内容</small>
                                        </div>
                                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#coursesModal">
                                            <i class="bi bi-book"></i> 管理课程
                                        </button>
                                    </div>
                                </div>

                                <!-- 校园动态管理 -->
                                <div class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">校园动态管理</h6>
                                            <small class="text-muted">管理首页显示的新闻动态</small>
                                        </div>
                                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#newsModal">
                                            <i class="bi bi-newspaper"></i> 管理动态
                                        </button>
                                    </div>
                                </div>

                                <!-- 校园全景视频管理 -->
                                <div class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <h6 class="mb-1">校园全景视频管理</h6>
                                            <small class="text-muted">更新校园全景展示视频</small>
                                        </div>
                                        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#videoModal">
                                            <i class="bi bi-camera-video"></i> 管理视频
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 导航栏管理 -->
                <div class="col-md-12 mb-4">
                    <div class="card">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="bi bi-list text-primary"></i> 导航栏管理</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-3">
                                <h6>导航项列表</h6>
                                <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addNavItemModal">
                                    <i class="bi bi-plus-lg"></i> 添加导航项
                                </button>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead>
                                        <tr>
                                            <th>序号</th>
                                            <th>名称</th>
                                            <th>链接</th>
                                            <th>排序</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="nav-items-table">
                                        <!-- 导航项数据将通过JavaScript动态加载 -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加导航项模态框 -->
    <div class="modal fade" id="addNavItemModal" tabindex="-1" aria-labelledby="addNavItemModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addNavItemModalLabel">添加导航项</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="nav-item-form">
                        <div class="mb-3">
                            <label for="nav-item-name" class="form-label">名称</label>
                            <input type="text" class="form-control" id="nav-item-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="nav-item-link" class="form-label">链接</label>
                            <input type="text" class="form-control" id="nav-item-link" required>
                        </div>
                        <div class="mb-3">
                            <label for="nav-item-order" class="form-label">排序</label>
                            <input type="number" class="form-control" id="nav-item-order" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="nav-item-status" checked>
                            <label class="form-check-label" for="nav-item-status">启用</label>
                        </div>
                        <div class="alert alert-danger d-none" id="nav-item-error"></div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑导航项模态框 -->
    <div class="modal fade" id="editNavItemModal" tabindex="-1" aria-labelledby="editNavItemModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editNavItemModalLabel">编辑导航项</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-nav-item-form">
                        <input type="hidden" id="edit-nav-item-id">
                        <div class="mb-3">
                            <label for="edit-nav-item-name" class="form-label">名称</label>
                            <input type="text" class="form-control" id="edit-nav-item-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-nav-item-link" class="form-label">链接</label>
                            <input type="text" class="form-control" id="edit-nav-item-link" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-nav-item-order" class="form-label">排序</label>
                            <input type="number" class="form-control" id="edit-nav-item-order" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="edit-nav-item-status">
                            <label class="form-check-label" for="edit-nav-item-status">启用</label>
                        </div>
                        <div class="alert alert-danger d-none" id="edit-nav-item-error"></div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/structure.js"></script>
</body>
</html>
