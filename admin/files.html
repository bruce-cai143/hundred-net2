<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理 - 管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/file.css">
</head>
<body>
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="bi bi-speedometer2"></i> 管理系统</h3>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="index.html"><i class="bi bi-house"></i> 控制面板</a></li>
                <li><a href="news.html"><i class="bi bi-newspaper"></i> 新闻管理</a></li>
                <li><a href="files.html" class="active"><i class="bi bi-folder"></i> 文件管理</a></li>
                <li><a href="teachers.html"><i class="bi bi-people"></i> 青年委员会</a></li>
                <li><a href="settings.html"><i class="bi bi-gear"></i> 系统设置</a></li>
            </ul>
        </div>
        
        <!-- 主内容区域 -->
        <div class="main-content">
            <!-- 顶部导航栏 -->
            <div class="top-navbar">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="bi bi-list"></i>
                </button>
                
                <div class="user-info d-flex align-items-center">
                    <img src="../assets/icon/admin.png" alt="管理员头像" class="me-2">
                    <span id="admin-name" class="me-3">管理员</span>
                    <button id="logout-btn" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-box-arrow-right"></i> 退出登录
                    </button>
                </div>
            </div>

            <!-- 文件管理内容 -->
            <div class="container-fluid">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="mb-0">文件管理</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    <i class="bi bi-cloud-upload"></i> 上传文件
                </button>
                </div>
            
            <!-- 搜索和筛选区域 -->
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索文件名或描述...">
                        <button class="btn btn-outline-secondary" type="button" id="searchBtn">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="categoryFilter">
                        <option value="">所有分类</option>
                            <option value="document">文档资料</option>
                            <option value="image">图片素材</option>
                            <option value="video">视频资源</option>
                        <option value="audio">音频文件</option>
                            <option value="other">其他文件</option>
                        </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="sortFilter">
                        <option value="upload_date DESC">最新上传</option>
                        <option value="upload_date ASC">最早上传</option>
                        <option value="title ASC">名称 A-Z</option>
                        <option value="title DESC">名称 Z-A</option>
                        <option value="file_size DESC">大小 ↓</option>
                        <option value="file_size ASC">大小 ↑</option>
                    </select>
                </div>
            </div>

            <!-- 文件列表 -->
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">文件列表</h5>
                </div>
                <div class="card-body">
                    <div id="fileList" class="row">
                        <!-- 文件列表将通过JavaScript动态加载 -->
                    </div>
                    
                    <!-- 分页 -->
                    <nav aria-label="文件分页" class="mt-4">
                        <ul class="pagination justify-content-center" id="pagination">
                            <!-- 分页将通过JavaScript动态加载 -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- 上传文件模态框 -->
    <div class="modal fade" id="uploadModal" tabindex="-1" aria-labelledby="uploadModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="uploadModalLabel">上传文件</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm">
                        <!-- 文件选择区域 -->
                        <div class="upload-area mb-3" id="uploadArea">
                            <div class="text-center p-5 border-2 border-dashed border-secondary rounded">
                                <i class="bi bi-cloud-upload display-1 text-muted"></i>
                                <h5 class="mt-3">拖拽文件到此处或点击选择</h5>
                                <p class="text-muted">支持的文件类型：图片、文档、视频、音频等</p>
                                <p class="text-muted">最大文件大小：50MB</p>
                                <input type="file" id="fileInput" class="d-none" accept="*/*">
                                <button type="button" class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                                    选择文件
                                </button>
                            </div>
                        </div>

                        <!-- 文件信息 -->
                        <div id="fileInfo" class="d-none mb-3">
                            <div class="alert alert-info">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-file-earmark me-2"></i>
                                    <div>
                                        <strong id="fileName"></strong>
                                        <br>
                                        <small id="fileSize"></small>
                                    </div>
                                </div>
                            </div>
                </div>
                
                        <!-- 上传进度 -->
                        <div id="uploadProgress" class="d-none mb-3">
                            <label class="form-label">上传进度</label>
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" style="width: 0%" id="progressBar">0%</div>
                            </div>
                    </div>
                    
                        <!-- 文件详情 -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="fileTitle" class="form-label">文件标题</label>
                                    <input type="text" class="form-control" id="fileTitle" placeholder="输入文件标题">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="fileCategory" class="form-label">文件分类</label>
                                    <select class="form-select" id="fileCategory">
                                        <option value="">自动检测</option>
                            <option value="document">文档资料</option>
                            <option value="image">图片素材</option>
                            <option value="video">视频资源</option>
                                        <option value="audio">音频文件</option>
                            <option value="other">其他文件</option>
                        </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="fileDescription" class="form-label">文件描述</label>
                            <textarea class="form-control" id="fileDescription" rows="3" placeholder="输入文件描述（可选）"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="uploadBtn" disabled>
                        <i class="bi bi-cloud-upload"></i> 开始上传
                    </button>
                </div>
            </div>
        </div>
                    </div>
                    
    <!-- 删除确认模态框 -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                <div class="modal-body">
                    <p>确定要删除这个文件吗？此操作无法撤销。</p>
                    <p class="text-danger"><strong id="deleteFileName"></strong></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                    </div>
                </div>
            </div>
        </div>

    <!-- 退出确认对话框 -->
    <div class="modal fade" id="logoutConfirmModal" tabindex="-1" aria-labelledby="logoutConfirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="logoutConfirmModalLabel">退出确认</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>确定要退出系统吗？</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="confirm-logout-btn">确认退出</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin-utils.js" type="module"></script>
    <script src="js/file.js" type="module"></script>
</body>
</html>
