<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青年委员会 - 后台管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/admin.css" rel="stylesheet">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="bi bi-speedometer2"></i> 管理系统</h3>
        </div>
        
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="bi bi-house"></i> 控制面板</a></li>
            <li><a href="news.html"><i class="bi bi-newspaper"></i> 新闻管理</a></li>
            <li><a href="files.html"><i class="bi bi-cloud-upload"></i> 文件管理</a></li>
            <li><a href="teachers.html" class="active"><i class="bi bi-people"></i> 青年委员会</a></li>
            <li><a href="settings.html"><i class="bi bi-gear"></i> 系统设置</a></li>

        </ul>
    </div>

            <!-- 主要内容区域 -->
            <main class="main-content">
                <!-- 顶部导航栏 -->
        <div class="top-navbar">
            <button class="menu-toggle" id="menu-toggle">
                <i class="bi bi-list"></i>
            </button>
            
            <div class="user-info d-flex align-items-center">
                <img src="https://via.placeholder.com/40" alt="管理员头像" class="me-2">
                <span id="admin-name" class="me-3">管理员</span>
                <a href="#" id="logout-btn" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-box-arrow-right"></i> 退出登录
                </a>
            </div>
        </div>
        
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">教师管理</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTeacherModal">
                            <i class="bi bi-plus-lg"></i> 添加教师
                        </button>
                    </div>
                </div>

                <!-- 教师列表 -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>姓名</th>
                                <th>头像</th>
                                <th>职称</th>
                                <th>专业方向</th>
                                <th>联系方式</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="teachers-table">
                            <!-- 教师数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
            </main>

    <!-- 添加教师模态框 -->
    <div class="modal fade" id="addTeacherModal" tabindex="-1" aria-labelledby="addTeacherModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addTeacherModalLabel">添加教师</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="teacher-form">
                        <div class="mb-3">
                            <label for="teacher-name" class="form-label">姓名</label>
                            <input type="text" class="form-control" id="teacher-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="teacher-avatar" class="form-label">头像</label>
                            <input type="file" class="form-control" id="teacher-avatar" accept="image/*" required>
                            <div id="avatar-preview" class="mt-2"></div>
                        </div>
                        <div class="mb-3">
                            <label for="teacher-title" class="form-label">职称</label>
                            <input type="text" class="form-control" id="teacher-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="teacher-specialty" class="form-label">专业方向</label>
                            <input type="text" class="form-control" id="teacher-specialty" required>
                        </div>
                        <div class="mb-3">
                            <label for="teacher-contact" class="form-label">联系方式</label>
                            <input type="text" class="form-control" id="teacher-contact">
                        </div>
                        <div class="mb-3">
                            <label for="teacher-introduction" class="form-label">个人简介</label>
                            <textarea class="form-control" id="teacher-introduction" rows="3"></textarea>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="teacher-status" checked>
                            <label class="form-check-label" for="teacher-status">在职</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="save-teacher">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑教师模态框 -->
    <div class="modal fade" id="editTeacherModal" tabindex="-1" aria-labelledby="editTeacherModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editTeacherModalLabel">编辑教师信息</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-teacher-form">
                        <input type="hidden" id="edit-teacher-id">
                        <div class="mb-3">
                            <label for="edit-teacher-name" class="form-label">姓名</label>
                            <input type="text" class="form-control" id="edit-teacher-name" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-teacher-avatar" class="form-label">头像</label>
                            <input type="file" class="form-control" id="edit-teacher-avatar" accept="image/*">
                            <div id="edit-avatar-preview" class="mt-2"></div>
                        </div>
                        <div class="mb-3">
                            <label for="edit-teacher-title" class="form-label">职称</label>
                            <input type="text" class="form-control" id="edit-teacher-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-teacher-specialty" class="form-label">专业方向</label>
                            <input type="text" class="form-control" id="edit-teacher-specialty" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-teacher-contact" class="form-label">联系方式</label>
                            <input type="text" class="form-control" id="edit-teacher-contact">
                        </div>
                        <div class="mb-3">
                            <label for="edit-teacher-introduction" class="form-label">个人简介</label>
                            <textarea class="form-control" id="edit-teacher-introduction" rows="3"></textarea>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="edit-teacher-status">
                            <label class="form-check-label" for="edit-teacher-status">在职</label>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="update-teacher">更新</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin-utils.js" type="module"></script>
    <script src="js/admin.js"></script>
    <script src="js/teachers.js"></script>

    <!-- 退出确认对话框 -->
    <!-- 退出登录功能由 admin-utils.js 处理 -->
</body>
</html>
