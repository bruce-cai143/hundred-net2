        .download-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .file-categories {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .file-category {
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            background: #f1f1f1;
            transition: all 0.3s;
        }
        .file-category.active {
            background: #2196F3;
            color: white;
        }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .file-card {
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .file-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #2196F3;
            text-align: center;
        }
        .file-info {
            flex-grow: 1;
        }
        .file-name {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .file-meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .file-description {
            color: #333;
            margin-bottom: 15px;
            flex-grow: 1;
        }
        .file-actions {
            margin-top: auto;
        }
        .download-btn {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .download-btn:hover {
            background: #388E3C;
        }
        .download-count {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-top: 8px;
        }
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 40px;
            gap: 10px;
        }
        .pagination-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .pagination-btn.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }
        .pagination-btn:hover:not(.active) {
            background: #f5f5f5;
        }
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .search-btn {
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .no-files {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: #666;
        }
        /* 图片墙样式 */
        #image-gallery-section {
            display: none;
            margin-top: 30px;
        }
        .gallery-container {
            margin-top: 20px;
        }
        
        /* 图片卡片样式 */
        #gallery-container .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        #gallery-container .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        #gallery-container .card-img-top {
            transition: transform 0.3s ease;
        }
        
        #gallery-container .card:hover .card-img-top {
            transform: scale(1.05);
        }
        
        #gallery-container .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        #gallery-container .card-text {
            font-size: 0.9rem;
            color: #666;
        }
        
        /* 分类过滤器样式 */
        .category-filter .btn {
            margin-right: 10px;
            margin-bottom: 10px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        
        .category-filter .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        /* 图片分页样式 */
        #image-pagination {
            margin-top: 30px;
            justify-content: center;
        }
        
        #image-pagination .pagination-btn {
            margin: 0 5px;
        }
        
        /* 加载进度条样式 */
        #loading-progress {
            margin: 20px 0;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            #gallery-container .col-md-4 {
                margin-bottom: 20px;
            }
            
            .category-filter .btn {
                margin-bottom: 8px;
                font-size: 0.9rem;
                padding: 6px 12px;
            }
        }
    </style>
</head>

    <script>
        // 文件类型图标
        const fileIcons = {
            'document': '📄',
            'image': '🖼️',
            'video': '🎬',
            'audio': '🎵',
            'other': '📦'
        };
        let currentPage = 1;
        let currentCategory = '';
        let currentSearch = '';
        const pageSize = 12;

        document.addEventListener('DOMContentLoaded', function() {
            bindDownloadEvents();
            loadFiles();
        });

        function bindDownloadEvents() {
            // 搜索
            document.getElementById('searchBtn').onclick = function() {
                currentSearch = document.getElementById('searchInput').value.trim();
                currentPage = 1;
                loadFiles();
            };
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    currentSearch = this.value.trim();
                    currentPage = 1;
                    loadFiles();
                }
            });
            // 分类
            document.querySelectorAll('.file-category').forEach(el => {
                el.onclick = function() {
                    document.querySelectorAll('.file-category').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category === 'all' ? '' : this.dataset.category;
                    currentPage = 1;
                    loadFiles();
                };
            });
        }

        async function loadFiles() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '<div class="col-12 text-center py-5"><div class="spinner-border" role="status"></div></div>';
            let url = `/api/media/files?limit=${pageSize}&offset=${(currentPage-1)*pageSize}`;
            if (currentCategory) url += `&category=${encodeURIComponent(currentCategory)}`;
            if (currentSearch) url += `&search=${encodeURIComponent(currentSearch)}`;
            url += '&sort=created_at&order=DESC';
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (!data.success) throw new Error(data.message || '加载失败');
                renderFileGrid(data.files);
                renderPagination(data.total, currentPage);
            } catch (e) {
                grid.innerHTML = `<div class='col-12 text-center text-danger py-5'>${e.message}</div>`;
                document.getElementById('pagination').innerHTML = '';
            }
        }

        function renderFileGrid(files) {
            const grid = document.getElementById('fileGrid');
            if (!files || files.length === 0) {
                grid.innerHTML = `<div class='no-files'>暂无可下载文件</div>`;
                return;
            }
            grid.innerHTML = files.map(file => {
                const icon = fileIcons[file.category] || fileIcons.other;
                const fileSize = formatFileSize(file.size);
                const uploadDate = new Date(file.created_at).toLocaleDateString();
                return `<div class='file-card'>
                    <div class='file-icon'>${icon}</div>
                    <div class='file-info'>
                        <div class='file-name'>${file.original_name}</div>
                        <div class='file-meta'>${fileSize} | 上传：${uploadDate}</div>
                    </div>
                    <div class='file-actions'>
                        <button class='download-btn' onclick='window.open("/api/media/download/${file.id}")'><i class='bi bi-download'></i> 下载</button>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPagination(total, page) {
            const totalPages = Math.ceil(total / pageSize);
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) { pag.innerHTML = ''; return; }
            let html = '';
            html += `<button class='pagination-btn' ${page===1?'disabled':''} onclick='changePage(${page-1})'>&laquo;</button>`;
            for (let i=1; i<=totalPages; i++) {
                if (i===1 || i===totalPages || (i>=page-2 && i<=page+2)) {
                    html += `<button class='pagination-btn${i===page?' active':''}' onclick='changePage(${i})'>${i}</button>`;
                } else if (i===page-3 || i===page+3) {
                    html += `<span class='pagination-btn disabled'>...</span>`;
                }
            }
            html += `<button class='pagination-btn' ${page===totalPages?'disabled':''} onclick='changePage(${page+1})'>&raquo;</button>`;
            pag.innerHTML = html;
        }
        window.changePage = function(p) { currentPage = p; loadFiles(); };
        function formatFileSize(size) {
            if (!size) return '0B';
            if (size < 1024) return size + 'B';
            if (size < 1024*1024) return (size/1024).toFixed(1) + 'KB';
            if (size < 1024*1024*1024) return (size/1024/1024).toFixed(1) + 'MB';
            return (size/1024/1024/1024).toFixed(1) + 'GB';
        }
    </script>
